name: Build and sign for internal use

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Get version
        run: |
          VERSION=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' manifest.json | sed 's/.*: *"//;s/"//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Package extension
        run: |
          mkdir -p dist
          zip -r "dist/linkding-$VERSION.zip" \
            manifest.json build icons options popup styles

      - name: Package source for review
        run: |
          git archive --format=zip -o "dist/linkding-$VERSION-src.zip" HEAD

      - name: Sign with Mozilla
        uses: cardinalby/webext-buildtools-firefox-sign-xpi-action@v2
        with:
          zipFilePath: "dist/linkding-${{ env.VERSION }}.zip"
          sourcesZipFilePath: "dist/linkding-${{ env.VERSION }}-src.zip"
          xpiFilePath: "dist/linkding-signed.xpi"
          extensionId: linkding-extension@forked
          jwtIssuer: ${{ secrets.AMO_JWT_ISSUER }}
          jwtSecret: ${{ secrets.AMO_JWT_SECRET }}
          channel: unlisted

      - name: Upload signed .xpi
        uses: actions/upload-artifact@v4
        with:
          name: signed-xpi
          path: dist/linkding-signed.xpi
